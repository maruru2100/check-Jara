services:
  db:
    image: postgres:15
    container_name: check-jara-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    container_name: check-jara-flyway
    command: -url=jdbc:postgresql://db:5432/${POSTGRES_DB} -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} -connectRetries=60 migrate
    volumes:
      - ./db/sql:/flyway/sql
    depends_on:
      - db

  app:
    build: ./app
    container_name: check-jara-app
    volumes:
      - ./app:/app
      - ./logs:/logs
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_started
      flyway:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:latest
    container_name: check-jara-metabase
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase.db
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase.db/metabase.db
    depends_on:
      - db
  
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: check-jara-db-backup
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=0 18 * * * # ★毎日18:00に実行
      - BACKUP_KEEP_DAYS=14        # 7日間保持
      - BACKUP_SUFFIX=.sql.gz     # 圧縮して保存
    volumes:
      - ./backups:/backups        # ホストの ./backups に保存
    depends_on:
      - db

volumes:
  postgres_data:
  metabase_data:
